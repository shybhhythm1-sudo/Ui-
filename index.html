  }, {enableHighAccuracy:true, timeout:10000});
}
function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e)=>{ img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = ()=>{
      let w = img.width, h = img.height;
      if(w > h && w > maxDim){ h = h*(maxDim/w); w = maxDim; }
      else if(h > maxDim){ w = w*(maxDim/h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============ تسجيل الرسائل الصوتية ============ */
let mediaRecorder = null;
let mediaStream = null;
let audioChunks = [];
let recAudioContext = null;
let recAnalyser = null;
let waveformSamples = [];
let recTimerInterval = null;
let waveSampleInterval = null;
let recStartTs = 0;
let recStartX = 0;
let recCancelled = false;

const micBtn = document.getElementById('micBtn');
micBtn.addEventListener('mousedown', startRecording);
micBtn.addEventListener('touchstart', startRecording, {passive:true});
document.addEventListener('mouseup', stopRecordingHandler);
document.addEventListener('touchend', stopRecordingHandler);
document.addEventListener('mousemove', dragMove);
document.addEventListener('touchmove', dragMove, {passive:true});

function getClientX(e){
  return e.touches && e.touches[0] ? e.touches[0].clientX : e.clientX;
}

async function startRecording(e){
  if(!currentChatId || mediaRecorder) return;
  recCancelled = false;
  recStartX = getClientX(e);
  try{
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:true,
        noiseSuppression:true,
        autoGainControl:true,
        channelCount:1,
        sampleRate:48000
      }
    });
  }catch(err){
    showToast('محتاج إذن الميكروفون عشان تسجل رسالة صوتية، فعّله من إعدادات المتصفح', 'error');
    return;
  }
  let mimeType = 'audio/webm;codecs=opus';
  if(!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'audio/mp4';
  if(!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
  mediaRecorder = mimeType
    ? new MediaRecorder(mediaStream, {mimeType, audioBitsPerSecond:128000})
    : new MediaRecorder(mediaStream, {audioBitsPerSecond:128000});
  audioChunks = [];
  waveformSamples = [];
  mediaRecorder.ondataavailable = (ev)=>{ if(ev.data && ev.data.size>0) audioChunks.push(ev.data); };
  mediaRecorder.start();
  recStartTs = Date.now();

  recAudioContext = new (window.AudioContext || window.webkitAudioContext)();
  const source = recAudioContext.createMediaStreamSource(mediaStream);
  recAnalyser = recAudioContext.createAnalyser();
  recAnalyser.fftSize = 256;
  source.connect(recAnalyser);
  const dataArr = new Uint8Array(recAnalyser.frequencyBinCount);
  waveSampleInterval = setInterval(()=>{
    recAnalyser.getByteTimeDomainData(dataArr);
    let sum = 0;
    for(let i=0;i<dataArr.length;i++){ const v=(dataArr[i]-128)/128; sum += v*v; }
    const rms = Math.sqrt(sum/dataArr.length);
    waveformSamples.push(Math.min(1, rms*4));
  }, 120);

  micBtn.classList.add('recording');
  document.getElementById('composerRow').classList.add('hidden');
  document.getElementById('recordingBar').classList.add('active');
  document.getElementById('recHint').textContent = 'اسحب لليسار للإلغاء ⟵';
  document.getElementById('recHint').classList.remove('cancelReady');

  recTimerInterval = setInterval(()=>{
    const elapsed = Math.floor((Date.now()-recStartTs)/1000);
    document.getElementById('recTimer').textContent = mmss(elapsed);
  }, 200);
}

function dragMove(e){
  if(!mediaRecorder || mediaRecorder.state !== 'recording') return;
  const x = getClientX(e);
  const delta = x - recStartX;
  const hint = document.getElementById('recHint');
  if(delta < -80){
    recCancelled = true;
    hint.textContent = 'سيبه هتلغي التسجيل ✕';
    hint.classList.add('cancelReady');
  } else {
    recCancelled = false;
    hint.textContent = 'اسحب لليسار للإلغاء ⟵';
    hint.classList.remove('cancelReady');
  }
}

async function stopRecordingHandler(){
  if(!mediaRecorder || mediaRecorder.state !== 'recording') return;
  const wasCancelled = recCancelled;
  const elapsedSec = (Date.now()-recStartTs)/1000;

  await new Promise(resolve=>{
    mediaRecorder.onstop = resolve;
    mediaRecorder.stop();
  });

  clearInterval(recTimerInterval);
  clearInterval(waveSampleInterval);
  if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop());
  if(recAudioContext) recAudioContext.close();

  micBtn.classList.remove('recording');
  document.getElementById('composerRow').classList.remove('hidden');
  document.getElementById('recordingBar').classList.remove('active');

  const blobType = mediaRecorder.mimeType || 'audio/webm';
  const chunks = audioChunks;
  const samples = waveformSamples;
  mediaRecorder = null;
  mediaStream = null;

  if(wasCancelled || elapsedSec < 1 || chunks.length === 0){
    return;
  }

  const blob = new Blob(chunks, {type: blobType});
  const base64 = await blobToBase64(blob);
  const wave = downsampleWave(samples, 32);
  const ts = Date.now();

  await db.ref('messages/'+currentChatId).push({
    from: myUid, type:'voice', audio: base64, duration: Math.round(elapsedSec), wave, ts, delivered:true
  });
  await db.ref('chats/'+currentChatId+'/meta').update({lastMessage:'🎤 رسالة صوتية', lastTs: ts, lastSender: myUid});
}

function blobToBase64(blob){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onloadend = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
function downsampleWave(samples, count){
  if(samples.length === 0) return new Array(count).fill(0.15);
  const out = [];
  const bucket = samples.length / count;
  for(let i=0;i<count;i++){
    const start = Math.floor(i*bucket);
    const end = Math.max(start+1, Math.floor((i+1)*bucket));
    const slice = samples.slice(start, end);
    const avg = slice.reduce((a,b)=>a+b,0) / (slice.length || 1);
    out.push(Math.max(0.12, Math.min(1, avg)));
  }
  return out;
}
function mmss(totalSeconds){
  const s = Math.max(0, Math.floor(totalSeconds));
  const m = Math.floor(s/60);
  const r = s % 60;
  return m + ':' + String(r).padStart(2,'0');
}

/* ============ عرض وتشغيل الرسائل الصوتية - تصميم واتساب ============ */
function iconPlaySvg(){ return '<svg class="iconPlay" viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'; }
function iconPauseSvg(){ return '<svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>'; }
function iconMicStatusSvg(){ return '<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>'; }

/* توليد شكل موجة طبيعي متغيّر الارتفاع، أشبه بشكل واتساب */
function shapeWaveHeights(wave){
  const n = wave.length;
  return wave.map((v,i)=>{
    // مزج القيمة الحقيقية مع تمويج ناعم يعطي طابع عضوي بدل خط مستوي
    const organic = 0.55 + 0.45*Math.sin(i*0.9) * Math.cos(i*0.35);
    const mixed = v*0.75 + Math.abs(organic)*0.35;
    return Math.max(0.16, Math.min(1, mixed));
  });
}

function renderVoiceBubble(m, out, ticks, replyHtml, reactionsHtml, mid){
  const rawWave = (m.wave && m.wave.length) ? m.wave : new Array(30).fill(0.4);
  const wave = shapeWaveHeights(rawWave);
  const barsHtml = wave.map(v=>`<span style="height:${Math.max(14,Math.round(v*100))}%;"></span>`).join('');
  const statusRight = (out === 'in' && ticks) ? ticks : iconMicStatusSvg();
  return `
  <div class="bubble voice ${out}" data-mid="${mid||m.id}" data-mtype="voice" data-audio-id="${m.id}" data-audio-src="${m.audio}" data-duration="${m.duration||0}">
    ${replyHtml||''}
    <button class="playBtn" data-id="${m.id}">${iconPlaySvg()}</button>

        <span class="waveThumb" data-id="${m.id}"></span>
      </div>

  </div>`;
}

document.getElementById('messages').addEventListener('click', (e)=>{

function toggleVoicePlay(id){
  const bubble = document.querySelector(`.bubble.voice[data-audio-id="${id}"]`);
  if(!bubble) return;
  const btn = bubble.querySelector('.playBtn');

  if(currentVoiceId === id && currentVoiceAudio){
    if(currentVoiceAudio.paused){ currentVoiceAudio.play(); btn.innerHTML=iconPauseSvg(); btn.classList.add('playing'); }
    else { currentVoiceAudio.pause(); btn.innerHTML=iconPlaySvg(); btn.classList.remove('playing'); }
    return;
  }
  if(currentVoiceAudio){
    currentVoiceAudio.pause();
    const oldBtn = document.querySelector(`.playBtn[data-id="${currentVoiceId}"]`);
    if(oldBtn){ oldBtn.innerHTML = iconPlaySvg(); oldBtn.classList.remove('playing'); }
  }
  currentVoiceAudio = new Audio(bubble.dataset.audioSrc);
  currentVoiceId = id;
  btn.innerHTML = iconPauseSvg();
  btn.classList.add('playing');
  bubble.classList.add('hasStarted');
  currentVoiceAudio.addEventListener('timeupdate', ()=>{
    const progress = document.querySelector(`.waveProgress[data-id="${id}"]`);
    const thumb = document.querySelector(`.waveThumb[data-id="${id}"]`);
    const label = document.querySelector(`.durLabel[data-id="${id}"]`);
    if(currentVoiceAudio.duration){
      const pct = (currentVoiceAudio.currentTime / currentVoiceAudio.duration) * 100;
      if(progress) progress.style.width = pct + '%';
      if(thumb) thumb.style.left = pct + '%';
      if(label) label.textContent = mmss(currentVoiceAudio.currentTime);
    }
  });
  currentVoiceAudio.addEventListener('ended', ()=>{
    btn.innerHTML=iconPlaySvg();
    btn.classList.remove('playing');
    const progress = document.querySelector(`.waveProgress[data-id="${id}"]`);
    const thumb = document.querySelector(`.waveThumb[data-id="${id}"]`);
    const label = document.querySelector(`.durLabel[data-id="${id}"]`);
    const bub = document.querySelector(`.bubble.voice[data-audio-id="${id}"]`);
    if(progress) progress.style.width='0%';
    if(thumb) thumb.style.left='0%';
    if(bub) bub.classList.remove('hasStarted');
    if(label && bub) label.textContent = mmss(parseFloat(bub.dataset.duration||0));
    currentVoiceId = null;
  });
  currentVoiceAudio.play();
}

function seekVoice(id, e, waveWrap){
  if(currentVoiceId !== id || !currentVoiceAudio || !currentVoiceAudio.duration) return;
  const rect = waveWrap.getBoundingClientRect();
  const clientX = e.touches && e.touches[0] ? e.touches[0].clientX : e.clientX;
  const fraction = Math.min(Math.max((clientX-rect.left)/rect.width, 0), 1);
  currentVoiceAudio.currentTime = fraction * currentVoiceAudio.duration;
}

let statusRowsCache = {};

/* رسم حلقة segments حوالين الأفاتار: كل تحديث له قطعة، ملوّنة لو ما اتشافتش، رمادية لو اتشافت */
function buildRingSegmentsSvg(total, seenFlags){
  const size = 56, cx = 28, cy = 28, r = 25.5, gap = 7; // gap بالدرجات بين كل قطعة
  const segAngle = (360 / total) - gap;
  let svg = '';
  for(let i=0;i<total;i++){
    const startAngle = i * (360/total) + gap/2;
    const endAngle = startAngle + segAngle;
    const color = seenFlags[i] ? '#c9c2ae' : '#0F6E5C';
    svg += arcPath(cx, cy, r, startAngle, endAngle, color);
  }
  return `<svg class="ringSvg" viewBox="0 0 ${size} ${size}">${svg}</svg>`;
}
function polarToXY(cx, cy, r, angleDeg){
  const a = (angleDeg) * Math.PI / 180;
  return { x: cx + r*Math.cos(a), y: cy + r*Math.sin(a) };
}
function arcPath(cx, cy, r, startAngle, endAngle, color){
  const start = polarToXY(cx, cy, r, startAngle);
  const end = polarToXY(cx, cy, r, endAngle);
  const largeArc = (endAngle-startAngle) > 180 ? 1 : 0;
  return `<path d="M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y}" fill="none" stroke="${color}" stroke-width="2.6" stroke-linecap="round"/>`;
}

function loadStatuses(){
  document.getElementById('myStatusAvatar').style.background = avatarColor(myProfile.username);
  document.getElementById('myStatusAvatar').textContent = initials(myProfile.name);

  db.ref('status/'+myUid).on('value', snap=>{
    const ringSvgEl = document.getElementById('myStatusRingSvg');
    if(snap.exists()){
      const raw = snap.val();
      const items = Object.keys(raw).map(id=>({id, ...raw[id]})).sort((a,b)=>a.ts-b.ts);
      document.getElementById('myStatusSub').textContent = items.length + ' تحديث نشط • اضغط للمشاهدة';
      // حالتي دايمًا بلون البراند (مش مهم تتعلم "متشافتش" لأني أنا صاحبها)
      const seenFlags = items.map(()=>false);
      ringSvgEl.outerHTML = buildRingSegmentsSvg(items.length, seenFlags);
    } else {
      document.getElementById('myStatusSub').textContent = 'اضغط لإضافة حالة';
      const cur = document.getElementById('myStatusRingSvg');
      if(cur) cur.outerHTML = '<svg class="ringSvg hidden" id="myStatusRingSvg" viewBox="0 0 56 56"></svg>';
    }
  });

  db.ref('status').on('value', async (snap)=>{
    const list = document.getElementById('statusList');
    statusRowsCache = {};
    if(!snap.exists()){ list.innerHTML = '<div class="empty-state">مفيش تحديثات دلوقتي</div>'; return; }
    const now = Date.now();
    const rows = [];
    const all = snap.val();
    for(const uid in all){
      if(uid === myUid) continue;
      const rawItems = all[uid];
      const items = Object.keys(rawItems).map(id=>({id, ...rawItems[id]})).filter(s=>s.expiresAt > now).sort((a,b)=>a.ts-b.ts);
      if(items.length === 0) continue;
      const userSnap = await db.ref('users/'+uid).get();
      if(!userSnap.exists()) continue;
      const u = userSnap.val();
      statusRowsCache[uid] = {user:u, items};
      const allSeen = items.every(it => it.viewers && it.viewers[myUid]);
      rows.push({uid, user:u, count: items.length, lastTs: items[items.length-1].ts, items, allSeen});
    }
    if(rows.length === 0){ list.innerHTML = '<div class="empty-state">مفيش تحديثات دلوقتي</div>'; return; }
    // اللي فيه جديد يطلع فوق، بعدين اللي اتشاف كله
    rows.sort((a,b)=>{
      if(a.allSeen !== b.allSeen) return a.allSeen ? 1 : -1;
      return b.lastTs - a.lastTs;
    });
    list.innerHTML = rows.map(r=>{
      const seenFlags = r.items.map(it => !!(it.viewers && it.viewers[myUid]));
      const ringSvg = buildRingSegmentsSvg(r.items.length, seenFlags);
      return `
      <div class="status-item" data-uid="${r.uid}">
        <div class="status-ring">
          ${ringSvg}
          <div class="avatar" style="background:${r.user.color};">${initials(r.user.name)}</div>
        </div>
        <div>
          <div style="font-weight:700;">${r.user.name}</div>
          <div style="font-size:12px;color:var(--muted);">${fmtTime(r.lastTs)} • ${r.count} تحديث</div>
        </div>
      </div>`;
    }).join('');
    list.querySelectorAll('.status-item').forEach(el=>{
      el.addEventListener('click', ()=> openStatusViewer(el.dataset.uid, false));
    });
  });
}

    const raw = snap.val();
    const items = Object.keys(raw).map(id=>({id, ...raw[id]})).filter(s=>s.expiresAt > now).sort((a,b)=>a.ts-b.ts);
    if(items.length === 0) return;
    const uSnap = await db.ref('users/'+uid).get();
    entry = {user: uSnap.exists() ? uSnap.val() : {name:'مستخدم', color:'#888'}, items};
  }
  svItems = entry.items;
  svUid = uid;
  svIsMine = isMine;
  svIndex = 0;
  document.getElementById('svAvatar').style.background = entry.user.color;
  document.getElementById('svAvatar').textContent = initials(entry.user.name);
  document.getElementById('svName').textContent = entry.user.name;
  buildSvProgress();
  statusViewer.classList.remove('hidden');
  showSvItem(0);
}

function buildSvProgress(){
  const row = document.getElementById('svProgressRow');
  row.innerHTML = svItems.map(()=>'<div class="svProgressSeg"><div class="fill"></div></div>').join('');
}

function showSvItem(i){
  clearSvTimer();
  if(i < 0){ closeStatusViewer(); return; }
  if(i >= svItems.length){ closeStatusViewer(); return; }
  svIndex = i;
  const item = svItems[i];
  document.getElementById('svTime').textContent = fmtTime(item.ts);

  const segs = document.querySelectorAll('#svProgressRow .svProgressSeg');
  segs.forEach((seg, idx)=>{
    seg.classList.toggle('done', idx < i);
    const fill = seg.querySelector('.fill');
    fill.style.width = idx < i ? '100%' : '0%';
    if(idx === i) seg.classList.remove('done');
  });

  // سجّل مشاهدتي للحالة دي لو مش أنا صاحبها
  if(!svIsMine && svUid){
    db.ref('status/'+svUid+'/'+item.id+'/viewers/'+myUid).set(Date.now());
  }
  // لو أنا صاحب الحالة، اعرض شريط عدد المشاهدين لهالتحديث بالذات
  updateSvFooterForItem(item);

  const body = document.getElementById('svBody');
  body.querySelectorAll('img,video,.svTextCard').forEach(el=>el.remove());
  const tapLeft = document.getElementById('svTapLeft');
  const tapRight = document.getElementById('svTapRight');

  if(item.type === 'video'){
    const v = document.createElement('video');
    v.src = item.video; v.controls = false; v.autoplay = true; v.playsInline = true; v.muted = false;
    body.insertBefore(v, tapLeft);
    svTimerDur = 15000;
    v.addEventListener('loadedmetadata', ()=>{
      if(v.duration && isFinite(v.duration)) svTimerDur = Math.min(v.duration*1000, 60000);
      startSvTimer(i);
    }, {once:true});
  } else if(item.type === 'image'){
    const img = document.createElement('img');
    img.src = item.image;
    body.insertBefore(img, tapLeft);
    svTimerDur = 5000;
    startSvTimer(i);
  } else {
    const card = document.createElement('div');
    card.className = 'svTextCard';
    card.textContent = item.text || '';
    body.insertBefore(card, tapLeft);
    svTimerDur = 5000;
    startSvTimer(i);
  }
  if(item.caption){
    const cap = document.createElement('div');
    cap.className = 'svTextCard';
    cap.style.position = 'absolute';
    cap.style.bottom = '18px';
    cap.style.top = 'auto';
    cap.style.minHeight = 'auto';
    cap.style.background = 'rgba(0,0,0,.5)';
    cap.style.fontSize = '14px';
    cap.style.padding = '10px 16px';
    cap.textContent = item.caption;
    body.appendChild(cap);
  }
}

/* تحديث شريط الفوتر حسب التحديث المعروض حاليًا: زرار حذف + عدد المشاهدين لو أنا صاحب الحالة */
function updateSvFooterForItem(item){
  const footer = document.getElementById('svFooter');
  if(!svIsMine){ footer.innerHTML = ''; return; }
  const viewers = item.viewers || {};
  const count = Object.keys(viewers).length;
  const eyeSvg = '<svg class="eyeIcon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  const chevronSvg = '<svg class="chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';
  footer.innerHTML = `
    <div class="svViewersBar" id="svViewersBar">
      ${eyeSvg}
      <span class="count">${count} مشاهدة</span>
      ${chevronSvg}
    </div>
    <button class="svDelete" id="svDeleteBtn">حذف الحالة الحالية</button>
  `;
  document.getElementById('svDeleteBtn').addEventListener('click', deleteSvCurrent);
  document.getElementById('svViewersBar').addEventListener('click', ()=> openViewersSheet(item));
}

/* ---- شيت قائمة المشاهدين ---- */
const viewersSheet = document.getElementById('viewersSheet');
async function openViewersSheet(item){
  clearSvTimer();
  const viewers = item.viewers || {};
  const uids = Object.keys(viewers).sort((a,b)=> viewers[b]-viewers[a]);
  document.getElementById('viewersCountText').textContent = uids.length + ' مشاهدة';
  const scroll = document.getElementById('viewersScroll');
  if(uids.length === 0){
    scroll.innerHTML = '<div class="viewersEmpty">محدش شاف الحالة دي لسه</div>';
  } else {
    scroll.innerHTML = '<div class="viewersEmpty" style="padding:16px;">جاري التحميل...</div>';
    const rows = [];
    for(const uid of uids){
      const uSnap = await db.ref('users/'+uid).get();
      if(!uSnap.exists()) continue;
      const u = uSnap.val();
      rows.push({u, ts: viewers[uid]});
    }
    scroll.innerHTML = rows.map(r=>`
      <div class="viewer-item">
        <div class="avatar" style="width:40px;height:40px;font-size:14px;background:${r.u.color};">${initials(r.u.name)}</div>
        <div class="vname">${r.u.name}</div>
        <div class="vtime">${fmtTime(r.ts)}</div>
      </div>
    `).join('') || '<div class="viewersEmpty">محدش شاف الحالة دي لسه</div>';
  }
  viewersSheet.classList.remove('hidden');
}
viewersSheet.addEventListener('click', (e)=>{
  if(e.target === viewersSheet){
    viewersSheet.classList.add('hidden');
    if(!statusViewer.classList.contains('hidden')) startSvTimer(svIndex);
  }
});

function startSvTimer(i){
  svTimerStart = Date.now();
  const seg = document.querySelectorAll('#svProgressRow .svProgressSeg')[i];
  const fill = seg ? seg.querySelector('.fill') : null;
  function tick(){
    const elapsed = Date.now() - svTimerStart;
    const pct = Math.min(100, (elapsed / svTimerDur) * 100);
    if(fill) fill.style.width = pct + '%';
    if(elapsed >= svTimerDur){ showSvItem(svIndex + 1); return; }
    svRafId = requestAnimationFrame(tick);
  }
  svRafId = requestAnimationFrame(tick);
}
function clearSvTimer(){
  if(svRafId){ cancelAnimationFrame(svRafId); svRafId = null; }
  const body = document.getElementById('svBody');
  const v = body.querySelector('video');
  if(v) v.pause();
}
function closeStatusViewer(){
  clearSvTimer();
  statusViewer.classList.add('hidden');
  svItems = []; svIndex = 0; svUid = null;
}
document.getElementById('svCloseBtn').addEventListener('click', closeStatusViewer);
document.getElementById('svTapLeft').addEventListener('click', ()=> showSvItem(svIndex - 1));
document.getElementById('svTapRight').addEventListener('click', ()=> showSvItem(svIndex + 1));

async function deleteSvCurrent(){
  const item = svItems[svIndex];
  if(!item || !svUid) return;
  if(!confirm('تمسح الحالة دي؟')) return;
  await db.ref('status/'+svUid+'/'+item.id).remove();
  svItems.splice(svIndex, 1);
  if(svItems.length === 0){ closeStatusViewer(); return; }
  buildSvProgress();
  showSvItem(Math.min(svIndex, svItems.length - 1));
}

/* ============ المكالمات: السجل ============ */
function loadCalls(){
  db.ref('calls/'+myUid).on('value', async (snap)=>{
    const list = document.getElementById('callsList');
    if(!snap.exists()){
      list.innerHTML = '<div class="empty-state"><div class="emoji"><svg viewBox="0 0 64 64" width="56" height="56" fill="none"><circle cx="32" cy="32" r="30" fill="#E6F1EB"/><path d="M24.5 22.5c1 2 2 3.6 3.4 5-1 1-2 2-2 3 1.5 4 5.5 8 9.5 9.5 1-.2 2-1.2 3-2.2 1.4 1.4 3 2.4 5 3.4a3 3 0 0 1-2 3.3c-7 2.2-16.7-7.5-18.9-14.5a3 3 0 0 1 2-3z" fill="#0F6E5C"/></svg></div>مفيش مكالمات لسه</div>';
      return;
    }
    const items = Object.values(snap.val()).sort((a,b)=>b.ts-a.ts).slice(0,50);
    const rows = [];
    for(const it of items){
      const uSnap = await db.ref('users/'+it.withUid).get();
      if(!uSnap.exists()) continue;
      const u = uSnap.val();
      rows.push({...it, user:u});
    }
    list.innerHTML = rows.map(r=>`
      <div class="call-item">
        <div class="avatar" style="background:${r.user.color};width:44px;height:44px;font-size:15px;">${initials(r.user.name)}</div>
        <div>
          <div style="font-weight:700;">${r.user.name}</div>
          <div style="font-size:12px;" class="${r.missed?'missed':''}" style="color:var(--muted);">
            ${r.direction==='out'?'صادرة ↗':(r.missed?'فائتة ✕':'واردة ↙')} • ${fmtTime(r.ts)}
          </div>
        </div>
        <div class="callBtnRow">
          <button class="roundIcon" data-uid="${r.withUid}" data-name="${r.user.name}" data-color="${r.user.color}"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></button>
        </div>
      </div>
    `).join('');
    list.querySelectorAll('.roundIcon').forEach(btn=>{
      btn.addEventListener('click', ()=> startCall(btn.dataset.uid, btn.dataset.name, btn.dataset.color));
    });
  });
}
async function logCall(withUid, direction, missed){
  const otherSnap = await db.ref('users/'+withUid).get();
  const ts = Date.now();
  await db.ref('calls/'+myUid).push({withUid, direction, missed: !!missed, ts});
  if(otherSnap.exists()){
    await db.ref('calls/'+withUid).push({withUid: myUid, direction: direction==='out'?'in':'out', missed: !!missed, ts});
  }
}

/* ============ مكالمات صوتية WebRTC ============ */
document.getElementById('startVoiceCallBtn').addEventListener('click', ()=>{
  if(currentPeer) startCall(currentPeer.uid, currentPeer.name, currentPeer.color);
});

async function startCall(peerUid, peerName, peerColor){
  callWithUid = peerUid;
  isCaller = true;
  currentCallId = myUid + '_' + Date.now();
  showCallScreen(peerName, peerColor, true);
  document.getElementById('callStatusText').textContent = 'جاري الاتصال...';

  localStream = await navigator.mediaDevices.getUserMedia({
    audio:{
      echoCancellation:true,
      noiseSuppression:true,
      autoGainControl:true,
      channelCount:1
    }
  });
  pc = new RTCPeerConnection(ICE_SERVERS);
  localStream.getTracks().forEach(t=>pc.addTrack(t, localStream));
  pc.ontrack = (e)=>{ document.getElementById('remoteAudio').srcObject = e.streams[0]; };
  pc.onicecandidate = (e)=>{
    if(e.candidate){
      db.ref('signaling/'+peerUid+'/candidates/'+currentCallId).push({from: myUid, candidate: e.candidate.toJSON()});
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await db.ref('signaling/'+peerUid+'/incoming').set({
    from: myUid, fromName: myProfile.name, fromColor: myProfile.color,
    callId: currentCallId, offer: offer, ts: Date.now()
  });

  db.ref('signaling/'+myUid+'/answer/'+currentCallId).on('value', async (snap)=>{
    if(snap.exists() && pc && !pc.currentRemoteDescription){
      const data = snap.val();
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      document.getElementById('callStatusText').textContent = 'متصل الآن';
      document.getElementById('callControlsIncoming').classList.add('hidden');
      document.getElementById('callControlsActive').classList.remove('hidden');
    }
  });
  listenCandidates(currentCallId, peerUid);

  db.ref('signaling/'+peerUid+'/incoming').onDisconnect();
}

function listenForIncomingCalls(){
  db.ref('signaling/'+myUid+'/incoming').on('value', (snap)=>{
    if(!snap.exists()) return;
    const data = snap.val();
    if(document.getElementById('callScreen').classList.contains('hidden')){
      incomingCallData = data;
      callWithUid = data.from;
      isCaller = false;
      currentCallId = data.callId;
      showCallScreen(data.fromName, data.fromColor, false);
      document.getElementById('callStatusText').textContent = 'مكالمة واردة...';
    }
  });
}
let incomingCallData = null;

function showCallScreen(name, color, calling){
  document.getElementById('callScreen').classList.remove('hidden');
  document.getElementById('callPeerName').textContent = name;
  const av = document.getElementById('callAvatar');
  av.style.background = color || '#888';
  av.textContent = initials(name);
  if(calling){
    document.getElementById('callControlsIncoming').classList.add('hidden');
    document.getElementById('callControlsActive').classList.remove('hidden');
  } else {
    document.getElementById('callControlsIncoming').classList.remove('hidden');
    document.getElementById('callControlsActive').classList.add('hidden');
  }
}

document.getElementById('acceptCallBtn').addEventListener('click', async ()=>{
  const data = incomingCallData;
  if(!data) return;
  localStream = await navigator.mediaDevices.getUserMedia({
    audio:{
      echoCancellation:true,
      noiseSuppression:true,
      autoGainControl:true,
      channelCount:1
    }
  });
  pc = new RTCPeerConnection(ICE_SERVERS);
  localStream.getTracks().forEach(t=>pc.addTrack(t, localStream));
  pc.ontrack = (e)=>{ document.getElementById('remoteAudio').srcObject = e.streams[0]; };
  pc.onicecandidate = (e)=>{
    if(e.candidate){
      db.ref('signaling/'+data.from+'/candidates/'+data.callId).push({from: myUid, candidate: e.candidate.toJSON()});
    }
  };
  await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await db.ref('signaling/'+data.from+'/answer/'+data.callId).set({answer});
  document.getElementById('callStatusText').textContent = 'متصل الآن';
  document.getElementById('callControlsIncoming').classList.add('hidden');
  document.getElementById('callControlsActive').classList.remove('hidden');
  listenCandidates(data.callId, data.from);
  await db.ref('signaling/'+myUid+'/incoming').remove();
  logCall(data.from, 'in', false);
});

document.getElementById('declineCallBtn').addEventListener('click', async ()=>{
  if(incomingCallData){
    await db.ref('signaling/'+incomingCallData.from+'/incoming').remove();
    logCall(incomingCallData.from, 'in', true);
  }
  endCallCleanup();
});
document.getElementById('endCallBtn').addEventListener('click', async ()=>{
  if(callWithUid){
    await db.ref('signaling/'+callWithUid+'/incoming').remove();
    if(isCaller) logCall(callWithUid, 'out', false);
  }
  endCallCleanup();
});

function listenCandidates(callId, peerUid){
  db.ref('signaling/'+myUid+'/candidates/'+callId).on('child_added', async (snap)=>{
    const data = snap.val();
    if(data.from !== myUid && pc){
      try{ await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); }catch(e){}
    }
  });
}

function endCallCleanup(){
  document.getElementById('callScreen').classList.add('hidden');
  if(pc){ pc.close(); pc = null; }
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
  if(currentCallId){
    db.ref('signaling/'+myUid+'/answer/'+currentCallId).off();
    db.ref('signaling/'+myUid+'/candidates/'+currentCallId).off();
    db.ref('signaling/'+myUid+'/candidates/'+currentCallId).remove();
    if(callWithUid) db.ref('signaling/'+callWithUid+'/candidates/'+currentCallId).remove();
  }
  incomingCallData = null;
  currentCallId = null;
  callWithUid = null;
}
