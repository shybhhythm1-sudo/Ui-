<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>همسة</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0F6E5C">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="همسة">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Markazi+Text:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E2620;
    --brand:#0F6E5C;
    --brand-light:#1C8E77;
    --brand-deep:#0A3F35;
    --brand-deeper:#082E27;
    --brand-soft:#E6F1EB;
    --gold:#D9A441;
    --gold-light:#EFC46F;
    --gold-deep:#B9852C;
    --canvas:#F6F2E8;
    --surface:#FFFFFF;
    --bubble-out:#E1F0E8;
    --bubble-in:#FFFFFF;
    --text:#17251F;
    --muted:#78867F;
    --danger:#BC5A45;
    --danger-deep:#9C4736;
    --line:#EAE3D3;
    --dark:var(--brand-deep);
    --mid:var(--brand);
    --accent:var(--gold);
    --bg-chat:var(--canvas);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Cairo',sans-serif;
    background:var(--canvas);
    color:var(--text);
    overflow:hidden;
    direction:rtl;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    background:var(--surface);
    position:relative;
    overflow:hidden;
    box-shadow:0 0 60px rgba(14,38,32,.12);
  }
  .hidden{display:none !important;}

  /* ===== شاشة الدخول ===== */
  #authScreen{
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:32px 26px;
    background:
      radial-gradient(circle at 18% 12%, rgba(217,164,65,.20), transparent 42%),
      radial-gradient(circle at 82% 88%, rgba(239,196,111,.14), transparent 45%),
      linear-gradient(165deg,var(--brand-deeper),var(--brand-deep) 45%,var(--brand-light));
    color:#fff;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  #authScreen::before{
    content:'';
    position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,.07) 1.4px, transparent 1.4px);
    background-size:26px 26px;
    opacity:.5;
    pointer-events:none;
  }
  #authScreen .brandMark{
    position:relative;z-index:1;
    display:flex;flex-direction:column;align-items:center;margin-bottom:36px;
  }
  .wordmarkWrap{position:relative;display:flex;align-items:center;justify-content:center;padding:20px 0;}
  .rippleRing{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:84px;height:84px;border:1.5px solid rgba(217,164,65,.45);border-radius:50%;
    animation:whisperRipple 3.6s ease-out infinite;pointer-events:none;
  }
  .rippleRing.r2{animation-delay:1.2s;}
  .rippleRing.r3{animation-delay:2.4s;}
  @keyframes whisperRipple{
    0%{width:84px;height:84px;opacity:.55;}
    100%{width:310px;height:310px;opacity:0;}
  }
  @media (prefers-reduced-motion:reduce){.rippleRing{animation:none;opacity:0;}}
  #authScreen h1{
    font-family:'Markazi Text',serif;
    font-size:64px;
    font-weight:700;
    line-height:1;
    letter-spacing:1px;
    position:relative;z-index:1;
  }
  #authScreen .goldDot{width:34px;height:3px;border-radius:2px;background:var(--gold);margin-bottom:14px;}
  #authScreen p{opacity:.82;font-size:14px;position:relative;z-index:1;}
  #authScreen .authForm{position:relative;z-index:1;width:100%;margin-top:30px;}
  #authScreen input{
    width:100%;
    padding:15px 16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.08);
    color:#fff;
    font-family:'Cairo',sans-serif;
    font-size:16px;
    margin-bottom:12px;
    text-align:right;
  }
  #authScreen input::placeholder{color:rgba(255,255,255,.55);}
  #authScreen input:focus{outline:2px solid var(--gold);background:rgba(255,255,255,.12);}
  #usernamePreview{
    width:100%;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.1);
    border-radius:10px;
    padding:10px 14px;
    font-size:13px;
    margin-bottom:18px;
    direction:ltr;
    text-align:left;
    color:#fff;
  }
  #usernamePreview b{color:var(--gold);}
  #authScreen button{
    width:100%;
    padding:15px;
    border-radius:14px;
    border:none;
    background:var(--gold);
    color:#291b04;
    font-weight:800;
    font-size:16px;
    font-family:'Cairo',sans-serif;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(217,164,65,.28);
    transition:transform .15s ease;
  }
  #authScreen button:active{transform:scale(.98);}
  #authScreen button:disabled{opacity:.45;box-shadow:none;}
  #authError{color:#ffd7d7;font-size:12px;margin-top:10px;min-height:16px;position:relative;z-index:1;}
  .authDivider{
    display:flex;align-items:center;gap:10px;margin:16px 0;color:rgba(255,255,255,.5);font-size:12px;
    position:relative;z-index:1;
  }
  .authDivider::before,.authDivider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.18);}
  #googleSignInBtn{
    width:100%;padding:13px;border-radius:14px;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.95);color:#3c4043;font-weight:700;font-size:14.5px;
    font-family:'Cairo',sans-serif;cursor:pointer;position:relative;z-index:1;
    display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 4px 14px rgba(0,0,0,.15);transition:transform .15s ease;
  }
  #googleSignInBtn:active{transform:scale(.98);}

  /* ===== الهيدر العلوي ===== */
  header.topbar{
    background:linear-gradient(120deg,var(--brand-deeper),var(--brand-deep) 45%,var(--brand-light));
    color:#fff;
    padding:16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    box-shadow:0 4px 16px rgba(8,46,39,.28);
  }
  header.topbar h2{font-size:19px;font-weight:800;letter-spacing:.2px;}
  .icon-btn{
    background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;
    display:flex;align-items:center;justify-content:center;
  }

  /* ===== المحتوى ===== */
  main{flex:1;overflow-y:auto;position:relative;background:var(--surface);}
  #chatsPage,#statusPage,#callsPage{animation:tabFadeIn .22s ease;}
  @keyframes tabFadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* قائمة المحادثات */
  .chat-item{
    display:flex;align-items:center;gap:13px;
    padding:14px 18px;border-bottom:1px solid var(--line);cursor:pointer;
    transition:background .15s ease;
  }
  .chat-item:active{background:var(--brand-soft);}
  .avatar{
    width:50px;height:50px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:18px;flex-shrink:0;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.25);
  }
  .avatarWrap{position:relative;flex-shrink:0;}
  .onlineDot{
    position:absolute;bottom:0;left:0;width:13px;height:13px;border-radius:50%;
    background:#3FBE7A;border:2.5px solid var(--surface);
  }
  .chat-info{flex:1;min-width:0;}
  .chat-info .row1{display:flex;justify-content:space-between;align-items:center;}
  .chat-info .name{font-weight:700;font-size:15px;color:var(--ink);}
  .chat-info .time{font-size:11px;color:var(--muted);}
  .chat-info .last{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty-state{padding:70px 28px;text-align:center;color:var(--muted);line-height:1.8;}
  .empty-state div.emoji{margin-bottom:14px;display:flex;justify-content:center;}

  .fab{
    position:absolute;bottom:22px;left:22px;
    width:56px;height:56px;border-radius:50%;
    background:var(--gold);color:#291b04;border:none;
    font-size:26px;box-shadow:0 8px 20px rgba(217,164,65,.4);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s ease;
    animation:fabBreathe 2.8s ease-in-out infinite;
  }
  @keyframes fabBreathe{
    0%,100%{box-shadow:0 8px 20px rgba(217,164,65,.4);}
    50%{box-shadow:0 8px 26px rgba(217,164,65,.65);}
  }
  .fab:active{transform:scale(.94);}

  /* ===== شاشة الشات - خلفية بنقشة واتساب ===== */
  #chatScreen{
    position:absolute;inset:0;
    background-color:#E4DDD1;
    background-image:
      linear-gradient(rgba(230,222,204,.94), rgba(230,222,204,.94)),
      repeating-linear-gradient(0deg, transparent 0 58px, rgba(15,110,92,.05) 58px 59px),
      repeating-linear-gradient(90deg, transparent 0 58px, rgba(15,110,92,.05) 58px 59px);
    display:flex;flex-direction:column;z-index:20;
  }
  #chatScreen::before{
    content:'';
    position:absolute;inset:0;
    background-image:
      radial-gradient(circle at 8px 8px, rgba(15,110,92,.06) 1.4px, transparent 1.6px);
    background-size:38px 38px;
    pointer-events:none;
    opacity:.9;
  }
  #chatScreen .chatHeader{
    background:linear-gradient(120deg,var(--brand-deeper),var(--brand-deep) 45%,var(--brand-light));color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;
    box-shadow:0 4px 16px rgba(8,46,39,.28);position:relative;z-index:1;
  }
  #chatScreen .chatHeader .name{font-weight:700;font-size:16px;}
  #chatScreen .chatHeader .status{font-size:11px;opacity:.8;}
  #messages{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:6px;position:relative;z-index:1;}
  .bubble{
    max-width:76%;padding:7px 9px 8px;border-radius:9px;font-size:14.5px;line-height:1.5;
    position:relative;word-wrap:break-word;
    animation:bubbleIn .16s ease;
  }
  @keyframes bubbleIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  /* رسالة واردة (من الطرف التاني): أبيض - على الشمال */
  .bubble.out{
    align-self:flex-end;
    background:#FFFFFF;
    border-radius:9px 9px 2px 9px;
    box-shadow:0 1px 1.5px rgba(0,0,0,.13);
  }
  .bubble.out::before{
    content:'';
    position:absolute;
    bottom:0;right:-7px;
    width:0;height:0;
    border-style:solid;
    border-width:0 0 8px 8px;
    border-color:transparent transparent transparent #FFFFFF;
  }
  /* رسالة صادرة (بتاعتي): أخضر واتساب الفاتح - على اليمين */
  .bubble.in{
    align-self:flex-start;
    background:#D9FDD3;
    color:#111B21;
    border-radius:9px 9px 9px 2px;
    box-shadow:0 1px 1.5px rgba(0,0,0,.1);
  }
  .bubble.in::after{
    content:'';
    position:absolute;
    bottom:0;left:-7px;
    width:0;height:0;
    border-style:solid;
    border-width:0 8px 8px 0;
    border-color:transparent #D9FDD3 transparent transparent;
  }
  .bubble.in .t{color:#667781;}
  .bubble .t{
    font-size:10.5px;color:#8b9a94;margin-top:2px;
    text-align:left;display:flex;align-items:center;justify-content:flex-end;gap:3px;
    direction:ltr;
  }
  .bubble.in .t .checkmarks{display:inline-flex;align-items:center;}
  .bubble.in .t .checkmarks svg{display:block;}
  .bubble.in .t .checkmarks.read svg{color:#53BDEB;}
  .bubble.in .t .checkmarks.sent svg{color:#8b9a94;}
  .bubble .editedTag{font-size:10px;color:#8b9a94;margin-left:2px;}
  .bubble.in .editedTag{color:#667781;}

  /* رسالة محذوفة */
  .bubble.deletedMsg{opacity:.65;font-style:italic;display:flex;align-items:center;gap:6px;color:var(--muted);}
  .bubble.in.deletedMsg{color:#4b6e51;}

  /* اقتباس الرد جوه الفقاعة */
  .replyQuote{
    display:flex;align-items:center;gap:6px;
    background:rgba(0,0,0,.045);
    border-radius:7px;
    padding:6px 8px;
    margin-bottom:4px;
    border-inline-start:3px solid var(--brand);
    cursor:pointer;
    max-width:100%;
  }
  .bubble.in .replyQuote{border-inline-start-color:#4b7a52;background:rgba(0,0,0,.06);}
  .replyQuote .rqBody{min-width:0;flex:1;}
  .replyQuote .rqName{font-size:12px;font-weight:800;color:var(--brand);margin-bottom:1px;}
  .bubble.in .replyQuote .rqName{color:#2d5f38;}
  .replyQuote .rqText{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .replyQuote .rqThumb{width:34px;height:34px;border-radius:5px;object-fit:cover;flex-shrink:0;}

  /* شريط الرد أثناء الكتابة فوق الكومبوزر */
  .replyBar{
    display:none;align-items:center;gap:10px;padding:9px 13px;background:var(--surface);
    border-top:1px solid var(--line);flex-shrink:0;
  }
  .replyBar.active{display:flex;}
  .replyBar .rbAccent{width:3px;align-self:stretch;background:var(--brand);border-radius:3px;flex-shrink:0;}
  .replyBar .rbBody{flex:1;min-width:0;}
  .replyBar .rbName{font-size:12.5px;font-weight:800;color:var(--brand);}
  .replyBar .rbText{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .replyBar .rbClose{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px;flex-shrink:0;}
  .editingBar .rbAccent{background:var(--gold);}
  .editingBar .rbName{color:var(--gold-deep);}

  /* التفاعلات (Reactions) */
  .msgReactions{
    display:flex;gap:3px;position:absolute;bottom:-11px;
    background:var(--surface);border-radius:11px;padding:1.5px 5px;
    box-shadow:0 1px 4px rgba(0,0,0,.18);
    font-size:12px;align-items:center;cursor:pointer;
  }
  .bubble.out .msgReactions{left:6px;}
  .bubble.in .msgReactions{right:6px;}
  .msgReactions .reactCount{font-size:10px;color:var(--muted);font-weight:700;margin-right:1px;}

  /* شريط اختيار الإيموجي السريع */
  .reactionPicker{
    position:fixed;z-index:230;background:var(--surface);border-radius:26px;
    padding:6px 8px;display:flex;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,.25);
    animation:reactPickIn .14s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes reactPickIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
  .reactionPicker button{
    background:transparent;border:none;font-size:22px;cursor:pointer;padding:4px 5px;
    border-radius:50%;transition:transform .12s ease;line-height:1;
  }
  .reactionPicker button:active{transform:scale(1.3);}

  /* قائمة خيارات الرسالة (context menu) */
  .msgContextOverlay{position:fixed;inset:0;z-index:225;background:rgba(0,0,0,.15);}
  .msgContextMenu{
    position:fixed;z-index:230;background:var(--surface);border-radius:14px;
    min-width:180px;box-shadow:0 10px 30px rgba(0,0,0,.28);overflow:hidden;
    animation:reactPickIn .14s cubic-bezier(.2,.9,.3,1.2);
  }
  .msgContextMenu button{
    width:100%;text-align:right;padding:12px 16px;background:transparent;border:none;
    font-family:'Cairo',sans-serif;font-size:14px;color:var(--ink);cursor:pointer;
    display:flex;align-items:center;gap:10px;
  }
  .msgContextMenu button:active{background:var(--canvas);}
  .msgContextMenu button.danger{color:var(--danger);}
  .msgContextMenu hr{border:none;border-top:1px solid var(--line);margin:2px 0;}

  /* بحث داخل المحادثة */
  .chatSearchBar{
    display:none;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);
    border-bottom:1px solid var(--line);flex-shrink:0;
  }
  .chatSearchBar.active{display:flex;}
  .chatSearchBar input{
    flex:1;border:none;background:var(--canvas);border-radius:20px;padding:9px 14px;
    font-family:'Cairo',sans-serif;font-size:13.5px;
  }
  .chatSearchBar button{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;}
  .chatSearchNav{display:flex;align-items:center;gap:2px;}
  .chatSearchCount{font-size:11.5px;color:var(--muted);min-width:34px;text-align:center;}
  .bubble.searchHit{outline:2px solid var(--gold);outline-offset:2px;}
  .bubble.searchActive{outline:2px solid var(--danger);outline-offset:2px;}

  /* بحث داخل قائمة المحادثات */
  .chatsSearchWrap{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--line);}
  .chatsSearchWrap input{
    width:100%;border:none;background:var(--canvas);border-radius:20px;padding:10px 16px;
    font-family:'Cairo',sans-serif;font-size:13.5px;box-shadow:inset 0 0 0 1px var(--line);
  }

  /* Pin و Mute في قائمة المحادثات */
  .chat-item{position:relative;}
  .chat-item.pinned{background:linear-gradient(90deg, rgba(217,164,65,.06), transparent);}
  .chat-info .row1{gap:6px;}
  .pinIcon{color:var(--gold-deep);display:flex;flex-shrink:0;}
  .muteIcon{color:var(--muted);display:flex;flex-shrink:0;}
  .chatLongMenu{
    position:fixed;z-index:230;background:var(--surface);border-radius:14px;
    min-width:190px;box-shadow:0 10px 30px rgba(0,0,0,.28);overflow:hidden;
    animation:reactPickIn .14s cubic-bezier(.2,.9,.3,1.2);
  }
  .chatLongMenu button{
    width:100%;text-align:right;padding:12px 16px;background:transparent;border:none;
    font-family:'Cairo',sans-serif;font-size:14px;color:var(--ink);cursor:pointer;
    display:flex;align-items:center;gap:10px;
  }
  .chatLongMenu button:active{background:var(--canvas);}
  .chatLongMenu button.danger{color:var(--danger);}
  .chatLongMenu hr{border:none;border-top:1px solid var(--line);margin:2px 0;}
  .composer{
    display:flex;align-items:center;gap:8px;padding:11px;background:var(--canvas);border-top:1px solid var(--line);flex-shrink:0;
  }
  .composer input{
    flex:1;border:none;border-radius:22px;padding:13px 17px;font-family:'Cairo',sans-serif;font-size:14px;background:var(--surface);box-shadow:inset 0 0 0 1px var(--line);
  }
  .sendBtn{
    width:44px;height:44px;border-radius:50%;background:var(--gold);border:none;color:#291b04;font-size:18px;cursor:pointer;flex-shrink:0;
    box-shadow:0 4px 12px rgba(217,164,65,.35);display:flex;align-items:center;justify-content:center;
  }
  .micBtn{
    width:44px;height:44px;border-radius:50%;background:var(--gold);border:none;color:#291b04;font-size:18px;cursor:pointer;flex-shrink:0;
    touch-action:none;user-select:none;box-shadow:0 4px 12px rgba(217,164,65,.35);display:flex;align-items:center;justify-content:center;
  }
  .micBtn.recording{background:var(--danger);color:#fff;box-shadow:0 4px 14px rgba(193,68,58,.4);}
  .recordingBar{
    display:none;align-items:center;gap:10px;padding:10px 16px;background:#f0f0f0;flex-shrink:0;
  }
  .recordingBar.active{display:flex;}
  .recDot{width:10px;height:10px;border-radius:50%;background:var(--danger);animation:recPulse 1s infinite;flex-shrink:0;}
  @keyframes recPulse{0%,100%{opacity:1;}50%{opacity:.25;}}
  #recTimer{font-weight:800;min-width:42px;}
  .recHint{color:var(--muted);font-size:12px;margin-right:auto;transition:color .2s;}
  .recHint.cancelReady{color:var(--danger);font-weight:700;}

  /* ===== رسالة صوتية - تصميم مطابق لواتساب ===== */
  .bubble.voice{
    display:flex;
    align-items:center;
    gap:9px;
    padding:8px 10px 8px 8px;
    max-width:78%;
    min-width:210px;
    border-radius:17px;
  }
  .bubble.voice.out{border-bottom-left-radius:4px;}
  .bubble.voice.in{border-bottom-right-radius:4px;}

  .voiceAvatarMini{
    width:34px;
    height:34px;
    border-radius:50%;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:12px;
    font-weight:800;
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.3);
  }

  .playBtn{
    width:36px;
    height:36px;
    border-radius:50%;
    background:var(--brand);
    color:#fff;
    border:none;
    flex-shrink:0;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 1px 3px rgba(15,110,92,.3);
    transition:transform .13s ease;
    padding:0;
  }
  .playBtn svg{position:relative;}
  .playBtn .iconPlay{margin-right:-2px;}
  .playBtn:active{transform:scale(.9);}
  .bubble.in .playBtn{
    background:var(--brand-deep);
  }

  .voiceCenter{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:3px;
    min-width:0;
  }

  .voiceWaveWrap{
    position:relative;
    width:100%;
    height:22px;
    cursor:pointer;
    display:flex;
    align-items:center;
  }
  .waveBase,.waveProgress .waveBars{
    display:flex;
    align-items:center;
    gap:2px;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  .waveBars span{
    display:block;
    width:2.5px;
    min-height:2px;
    border-radius:2px;
    background:rgba(15,110,92,.32);
    flex-shrink:0;
  }
  .waveProgress{
    position:absolute;
    top:0;
    left:0;
    height:100%;
    width:0%;
    overflow:hidden;
    z-index:1;
  }
  .waveProgress .waveBars span{
    background:var(--brand);
  }
  .waveThumb{
    position:absolute;
    top:50%;
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--brand);
    box-shadow:0 1px 4px rgba(0,0,0,.3),0 0 0 2px #fff;
    transform:translate(-50%,-50%);
    left:0%;
    pointer-events:none;
    opacity:0;
    z-index:2;
    transition:opacity .15s ease;
  }
  .bubble.voice.hasStarted .waveThumb{opacity:1;}

  .bubble.in .waveBars span{
    background:rgba(17,27,33,.22);
  }
  .bubble.in .waveProgress .waveBars span{
    background:#4b7a52;
  }
  .bubble.in .waveThumb{
    background:#4b7a52;
  }

  .voiceBottomRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 1px;
  }
  .durLabel{
    font-size:11.5px;
    font-weight:500;
    color:var(--muted);
    font-variant-numeric:tabular-nums;
    line-height:1;
  }
  .bubble.in .durLabel{color:#4b7a52;}

  .voiceStatusIcon{
    display:flex;
    align-items:center;
    gap:3px;
    color:var(--brand);
    opacity:.85;
  }
  .bubble.in .voiceStatusIcon{color:#4b7a52;}
  .voiceStatusIcon svg{display:block;}

  /* رسالة صورة / فيديو (شكل موحّد) */
  .bubble.image,.bubble.video{padding:4px;background:#FFFFFF !important;box-shadow:0 1px 1.5px rgba(0,0,0,.13) !important;max-width:65%;border-radius:9px;}
  .bubble.image img{width:100%;border-radius:7px;display:block;cursor:pointer;}
  .bubble.video{position:relative;}
  .bubble.video video{width:100%;border-radius:7px;display:block;background:#000;max-height:340px;}
  .bubble.image .t,.bubble.video .t{padding:4px 6px 0;}
  .bubble.image.in,.bubble.video.in{background:#D9FDD3 !important;}

  /* رسالة موقع */
  .bubble.location{padding:4px;background:#FFFFFF !important;box-shadow:0 1px 1.5px rgba(0,0,0,.13) !important;max-width:74%;border-radius:9px;}
  .bubble.location.in{background:#D9FDD3 !important;}
  .bubble.location .locCard{
    border-radius:7px;overflow:hidden;background:var(--surface);cursor:pointer;
  }
  .bubble.location .locMap{
    height:110px;width:100%;
    background:
      linear-gradient(180deg, rgba(15,110,92,.14), rgba(15,110,92,.05)),
      repeating-linear-gradient(0deg, rgba(120,134,127,.15) 0 1px, transparent 1px 22px),
      repeating-linear-gradient(90deg, rgba(120,134,127,.15) 0 1px, transparent 1px 22px),
      var(--brand-soft);
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .bubble.location .locPin{
    width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    background:var(--danger);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.25);
  }
  .bubble.location .locPin svg{transform:rotate(45deg);}
  .bubble.location .locInfo{padding:10px 12px;display:flex;align-items:center;gap:8px;}
  .bubble.location .locInfo b{font-size:13.5px;color:var(--ink);}
  .bubble.location .locInfo span{font-size:11px;color:var(--muted);}
  .bubble.location .t{padding:4px 6px 0;}

  /* شيت المرفقات */
  .attachSheet{
    position:fixed;inset:0;background:rgba(14,38,32,.5);z-index:210;display:flex;align-items:flex-end;justify-content:center;
  }
  .attachSheetBox{
    width:100%;max-width:520px;background:var(--surface);border-radius:22px 22px 0 0;padding:18px 18px 26px;
    animation:sheetUp .2s ease;
  }
  @keyframes sheetUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .attachSheetBox .sheetHandle{width:38px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 16px;}
  .attachGrid{display:flex;justify-content:space-around;gap:8px;}
  .attachOpt{display:flex;flex-direction:column;align-items:center;gap:8px;background:transparent;border:none;cursor:pointer;font-family:'Cairo',sans-serif;color:var(--ink);font-size:12px;}
  .attachOpt .attachIcon{
    width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;
    box-shadow:0 4px 12px rgba(14,38,32,.18);
  }
  .attachSheetCancel{width:100%;margin-top:18px;padding:13px;border-radius:12px;border:none;background:var(--canvas);color:var(--ink);font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;}

  /* اختيار نوع الحالة */
  .statusTypeGrid{display:flex;gap:10px;margin-bottom:6px;}
  .statusTypeGrid button{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border-radius:14px;
    border:1px solid var(--line);background:var(--canvas);cursor:pointer;font-family:'Cairo',sans-serif;font-size:12.5px;color:var(--ink);font-weight:700;
  }
  .statusTypeGrid button .attachIcon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;}

  /* عارض الحالات ملء الشاشة */
  #statusViewer{position:fixed;inset:0;background:#000;z-index:250;display:flex;flex-direction:column;}
  #statusViewer.hidden{display:none;}
  .svProgressRow{display:flex;gap:4px;padding:10px 10px 0;}
  .svProgressSeg{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.3);overflow:hidden;}
  .svProgressSeg .fill{height:100%;width:0%;background:#fff;}
  .svProgressSeg.done .fill{width:100% !important;}
  .svHeader{display:flex;align-items:center;gap:10px;padding:10px 14px;color:#fff;}
  .svHeader .name{font-weight:700;font-size:14px;}
  .svHeader .time{font-size:11px;opacity:.75;}
  .svHeader .svClose{margin-right:auto;background:transparent;border:none;color:#fff;cursor:pointer;padding:6px;}
  .svBody{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .svBody img,.svBody video{max-width:100%;max-height:100%;object-fit:contain;}
  .svBody .svTextCard{
    width:88%;max-width:400px;min-height:220px;border-radius:18px;display:flex;align-items:center;justify-content:center;
    padding:28px;text-align:center;font-size:20px;font-weight:700;color:#fff;line-height:1.7;
    background:linear-gradient(135deg,var(--brand-deep),var(--brand-light));
  }
  .svTapZone{position:absolute;top:0;bottom:0;width:35%;}
  .svTapZone.left{left:0;}
  .svTapZone.right{right:0;}
  .svFooter{padding:0;display:flex;justify-content:center;flex-direction:column;}
  .svDelete{background:rgba(188,90,69,.85);color:#fff;border:none;padding:9px 18px;border-radius:20px;font-family:'Cairo',sans-serif;font-weight:700;font-size:12.5px;cursor:pointer;margin:0 auto 14px;}

  /* شريط أسفل عارض الحالة: عدد المشاهدين (لصاحب الحالة) */
  .svViewersBar{
    display:flex;align-items:center;gap:8px;padding:12px 16px;color:#fff;cursor:pointer;
  }
  .svViewersBar .eyeIcon{opacity:.85;display:flex;}
  .svViewersBar .count{font-size:13px;font-weight:700;}
  .svViewersBar .chevron{margin-right:auto;opacity:.7;}

  /* شيت قائمة المشاهدين */
  .viewersSheet{position:fixed;inset:0;z-index:260;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.5);}
  .viewersSheetBox{
    width:100%;max-width:520px;max-height:60vh;background:var(--surface);border-radius:20px 20px 0 0;
    padding:14px 0 10px;display:flex;flex-direction:column;animation:sheetUp .2s ease;
  }
  .viewersSheetBox .sheetHandle{width:38px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 12px;}
  .viewersSheetHead{padding:0 18px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);}
  .viewersSheetHead b{font-size:14.5px;color:var(--ink);}
  .viewersSheetHead span{font-size:12px;color:var(--muted);}
  .viewersScroll{overflow-y:auto;flex:1;}
  .viewer-item{display:flex;align-items:center;gap:12px;padding:11px 18px;}
  .viewer-item .vname{font-weight:700;font-size:14px;color:var(--ink);}
  .viewer-item .vtime{font-size:11.5px;color:var(--muted);margin-right:auto;}
  .viewersEmpty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;}

  /* مؤشر الكتابة */
  .typingDots{display:inline-flex;gap:3px;align-items:center;}
  .typingDots span{width:5px;height:5px;border-radius:50%;background:#8FE0B8;animation:typingBounce 1.2s infinite ease-in-out;}
  .typingDots span:nth-child(2){animation-delay:.15s;}
  .typingDots span:nth-child(3){animation-delay:.3s;}
  @keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-3px);opacity:1;}}
  .backBtn{background:transparent;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:2px;}

  /* ===== الحالات ===== */
  .status-item{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s ease;}
  .status-item:active{background:var(--brand-soft);}
  .status-ring{
    width:56px;height:56px;border-radius:50%;padding:2.5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    position:relative;
  }
  .status-ring svg.ringSvg{position:absolute;inset:0;transform:rotate(-90deg);}
  .status-ring .avatar{box-shadow:0 0 0 2.5px var(--surface);width:50px;height:50px;font-size:17px;}
  .section-label{padding:12px 18px 8px;font-size:12px;color:var(--brand);font-weight:800;background:var(--surface);letter-spacing:.3px;}

  #myStatusBtn{display:flex;align-items:center;gap:13px;padding:15px 18px;cursor:pointer;border-bottom:1px solid var(--line);}
  .myStatusAvatarWrap{position:relative;flex-shrink:0;}
  .myStatusAddBtn{
    position:absolute;bottom:-2px;left:-2px;width:20px;height:20px;border-radius:50%;
    background:var(--gold);color:#291b04;border:2px solid var(--surface);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 2px 6px rgba(217,164,65,.4);
  }
  .myStatusAddBtn svg{display:block;}

  /* ===== المكالمات ===== */
  .call-item{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line);}
  .call-item .callIcon{font-size:18px;}
  .call-item .missed{color:var(--danger);}
  .callBtnRow{margin-right:auto;display:flex;gap:6px;}
  .roundIcon{background:var(--brand-soft);color:var(--brand);border:none;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  /* ===== شاشة المكالمة الجارية ===== */
  #callScreen{
    position:fixed;inset:0;background:linear-gradient(165deg,var(--brand-deeper),var(--brand-deep) 45%,var(--brand-light));
    color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:60px 24px 50px;z-index:100;text-align:center;
  }
  #callScreen .bigAvatar{
    width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:40px;font-weight:800;color:#fff;margin-bottom:18px;box-shadow:0 10px 30px rgba(0,0,0,.25);
    position:relative;
  }
  #callScreen .bigAvatar::before,#callScreen .bigAvatar::after{
    content:'';position:absolute;inset:-10px;border-radius:50%;border:1.5px solid rgba(217,164,65,.5);
    animation:callPulse 2.2s ease-out infinite;
  }
  #callScreen .bigAvatar::after{animation-delay:1.1s;}
  @keyframes callPulse{0%{transform:scale(1);opacity:.7;}100%{transform:scale(1.45);opacity:0;}}
  #callScreen h2{font-size:24px;margin-bottom:8px;}
  #callScreen p{opacity:.8;font-size:14px;}
  .callControls{display:flex;gap:30px;}
  .callControls button{
    width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .btnAccept{background:var(--gold);color:#291b04;box-shadow:0 8px 22px rgba(217,164,65,.35);}
  .btnDecline,.btnEnd{background:var(--danger);color:#fff;box-shadow:0 8px 22px rgba(193,68,58,.35);}

  /* ===== الناف بار ===== */
  nav.bottomnav{
    display:flex;justify-content:space-around;align-items:center;
    background:var(--surface);border-top:1px solid var(--line);padding:9px 0 11px;flex-shrink:0;
  }
  nav.bottomnav button{
    background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
    color:var(--muted);font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer;padding:4px 14px;
    transition:color .15s ease;
  }
  nav.bottomnav button.active{color:var(--brand);font-weight:800;}
  nav.bottomnav button.active::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:1px;}
  nav.bottomnav .navicon{font-size:20px;}

  /* مودال بسيط */
  .modal-overlay{position:fixed;inset:0;background:rgba(14,38,32,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:overlayIn .18s ease;}
  @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
  .modal-box{background:var(--surface);border-radius:18px;padding:22px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.25);animation:modalIn .22s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .modal-box h3{margin-bottom:14px;font-size:17px;color:var(--ink);}
  .modal-box input,.modal-box textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);font-family:'Cairo',sans-serif;margin-bottom:10px;font-size:14px;background:var(--canvas);transition:box-shadow .15s ease;}
  .modal-box input:focus,.modal-box textarea:focus{outline:none;box-shadow:0 0 0 2px var(--brand);}
  .modal-box .modalBtns{display:flex;gap:10px;margin-top:6px;}
  .modal-box .modalBtns button{flex:1;padding:12px;border-radius:12px;border:none;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;}
  .btnPrimary{background:var(--mid);color:#fff;}
  .btnGhost{background:#eee;color:#333;}
  .modalMsg{font-size:12px;color:var(--danger);min-height:16px;}

  /* توست داخلي متناسق مع هوية التطبيق بدل alert() الافتراضي */
  #toastHost{
    position:fixed;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;
    gap:8px;padding:0 16px 18px;z-index:400;pointer-events:none;
  }
  .toastCard{
    pointer-events:auto;
    max-width:440px;width:100%;
    display:flex;align-items:center;gap:11px;
    background:var(--brand-deeper);color:#fff;
    border-radius:14px;padding:13px 15px;
    box-shadow:0 10px 28px rgba(8,46,39,.35);
    font-size:13.5px;line-height:1.5;
    animation:toastIn .22s cubic-bezier(.2,.9,.3,1.2);
    border-inline-start:4px solid var(--gold);
  }
  .toastCard.error{border-inline-start-color:var(--danger);}
  .toastCard.success{border-inline-start-color:#3FBE7A;}
  .toastCard.leaving{animation:toastOut .18s ease forwards;}
  @keyframes toastIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes toastOut{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(10px);}}
  .toastIconWrap{
    width:32px;height:32px;border-radius:50%;flex-shrink:0;
    background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;
  }
  .toastCard.error .toastIconWrap{background:rgba(188,90,69,.35);}
  .toastCard.success .toastIconWrap{background:rgba(63,190,122,.3);}
  .toastText{flex:1;}
  .toastClose{background:transparent;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:2px;flex-shrink:0;display:flex;}
</style>
</head>
<body>

<div id="app">

  <!-- ===== شاشة تحميل أولية (فحص الجلسة) ===== -->
  <div id="bootScreen" style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(165deg,var(--brand-deeper),var(--brand-deep) 45%,var(--brand-light));">
    <div style="width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:var(--gold);animation:bootSpin .8s linear infinite;"></div>
  </div>
  <style>@keyframes bootSpin{to{transform:rotate(360deg);}}</style>

  <!-- ===== شاشة تسجيل الدخول ===== -->
  <div id="authScreen" class="hidden">
    <div class="brandMark">
      <div class="wordmarkWrap">
        <span class="rippleRing r1"></span>
        <span class="rippleRing r2"></span>
        <span class="rippleRing r3"></span>
        <h1>همسة</h1>
      </div>
      <div class="goldDot"></div>
      <p>تواصل بسهولة مع أصحابك</p>
    </div>
    <div class="authForm">
      <input id="nameInput" type="text" placeholder="اكتب اسمك بالعربي أو الإنجليزي">
      <div id="usernamePreview">اسم المستخدم: <b id="usernameOut">—</b></div>
      <button id="startBtn" disabled>ابدأ</button>
      <div class="authDivider"><span>أو</span></div>
      <button id="googleSignInBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.5 0 10.5-2.1 14.3-5.6l-6.6-5.6C29.6 34.7 26.9 36 24 36c-5.3 0-9.7-3.1-11.3-7.9l-6.6 5.1C9.6 39.6 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.6 5.6C41.9 36.4 44 30.9 44 24c0-1.3-.1-2.7-.4-3.5z"/>
        </svg>
        <span>تسجيل الدخول بجوجل</span>
      </button>
      <div id="authError"></div>
    </div>
  </div>

  <!-- ===== الشاشة الرئيسية ===== -->
  <div id="mainScreen" class="hidden" style="display:flex;flex-direction:column;height:100%;">

    <header class="topbar">
      <h2 id="pageTitle">المحادثات</h2>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="installBtn" class="hidden" style="background:var(--gold);color:#291b04;border:none;border-radius:16px;padding:6px 12px;font-family:'Cairo',sans-serif;font-weight:800;font-size:12px;cursor:pointer;box-shadow:0 3px 10px rgba(217,164,65,.4);">تثبيت التطبيق</button>
        <span id="myUsernameTag" style="font-size:12px;opacity:.85;"></span>
        <button id="profileBtn" style="width:32px;height:32px;border-radius:50%;border:none;color:#fff;font-weight:800;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;"></button>
      </div>
    </header>

    <main>
      <!-- صفحة المحادثات -->
      <div id="chatsPage">
        <div class="chatsSearchWrap">
          <input id="chatsSearchInput" type="text" placeholder="بحث في المحادثات">
        </div>
        <div id="chatsList"></div>
        <button class="fab" id="newChatFab"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>

      <!-- صفحة الحالات -->
      <div id="statusPage" class="hidden">
        <div id="myStatusBtn">

<script>
/* ============ إعداد Firebase ============ */
const firebaseConfig = {
  apiKey: "AIzaSyDdV2TYI3OFv6WHdPsvY096PMlrcdo6Tjg",

  messagingSenderId: "1001650525249",
  appId: "1:1001650525249:web:acc0ed79c424bdcdd9e2c0"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
const db = firebase.database();

let myUid = null;

/* ============ تثبيت التطبيق (PWA) ============ */
let deferredInstallPrompt = null;

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      swRegistration = reg;
    }).catch(err=>console.log('sw register failed', err));
  });
}

window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  document.getElementById('installBtn').classList.remove('hidden');
});

document.getElementById('installBtn').addEventListener('click', async ()=>{
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const {outcome} = await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  document.getElementById('installBtn').classList.add('hidden');
});

window.addEventListener('appinstalled', ()=>{
  document.getElementById('installBtn').classList.add('hidden');
  deferredInstallPrompt = null;
});
let myProfile = null;
let currentChatId = null;
let currentPeer = null;
let currentCallId = null;
let pc = null;
let localStream = null;
let callWithUid = null;
let isCaller = false;

const ICE_SERVERS = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
    { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }
  ]
};

/* ============ تحويل الاسم العربي لـ username إنجليزي ============ */
const arMap = {
  'ا':'a','أ':'a','إ':'e','آ':'a','ب':'b','ت':'t','ث':'th','ج':'j','ح':'h','خ':'kh',
  'د':'d','ذ':'th','ر':'r','ز':'z','س':'s','ش':'sh','ص':'s','ض':'d','ط':'t','ظ':'z',
  'ع':'a','غ':'gh','ف':'f','ق':'q','ك':'k','ل':'l','م':'m','ن':'n','ه':'h','و':'w',
  'ي':'y','ى':'a','ة':'a','ء':'a','ئ':'e','ؤ':'o','ﻻ':'la'
};
function toEnglishUsername(nameRaw){
  let out = '';
  for(const ch of nameRaw){
    if(arMap[ch] !== undefined) out += arMap[ch];
    else if(/[a-zA-Z0-9]/.test(ch)) out += ch;
    else if(ch === ' ') out += '.';
  }
  out = out.toLowerCase().replace(/[^a-z0-9.]/g,'').replace(/\.+/g,'.').replace(/^\.|\.$/g,'');
  if(!out) out = 'user';
  return out;
}
async function makeUniqueUsername(base){
  let candidate = base;
  let n = 0;
  while(true){
    const snap = await db.ref('usernames/'+candidate).get();
    if(!snap.exists()) return candidate;
    n++;
    candidate = base + n;
  }
}
function avatarColor(str){
  const colors = ['#F94144','#F3722C','#F8961E','#F9C74F','#90BE6D','#43AA8B','#577590','#277DA1','#9C6ADE'];
  let hash = 0;
  for(let i=0;i<str.length;i++) hash = str.charCodeAt(i) + ((hash<<5)-hash);
  return colors[Math.abs(hash) % colors.length];
}
function initials(name){
  return (name||'?').trim().charAt(0).toUpperCase();
}
function fmtTime(ts){
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
}

/* ============ تسجيل الدخول ============ */
const nameInput = document.getElementById('nameInput');
const usernameOut = document.getElementById('usernameOut');
const startBtn = document.getElementById('startBtn');
const authError = document.getElementById('authError');

nameInput.addEventListener('input', ()=>{
  const val = nameInput.value.trim();
  if(val.length > 0){
    usernameOut.textContent = toEnglishUsername(val) || '—';
    startBtn.disabled = false;
  } else {
    usernameOut.textContent = '—';
    startBtn.disabled = true;
  }
});

startBtn.addEventListener('click', async ()=>{
  const displayName = nameInput.value.trim();
  if(!displayName) return;
  startBtn.disabled = true;
  startBtn.textContent = 'جاري الإعداد...';
  authError.textContent = '';
  try{
    const cred = await auth.signInAnonymously();
    const uid = cred.user.uid;
    const base = toEnglishUsername(displayName);
    const username = await makeUniqueUsername(base);
    const profile = {
      name: displayName,
      username: username,
      color: avatarColor(username),
      createdAt: Date.now(),
      online: true
    };
    await db.ref('users/'+uid).set(profile);
    await db.ref('usernames/'+username).set(uid);

    myUid = uid;
    myProfile = profile;
    authResolved = true;
    db.ref('users/'+myUid+'/online').set(true);
    db.ref('users/'+myUid+'/online').onDisconnect().set(false);
    enterApp();
  }catch(e){
    console.error(e);
    if(e.code === 'auth/configuration-not-found'){
      authError.textContent = 'لازم تفعّل Anonymous Authentication من Firebase Console: Authentication > Sign-in method > Anonymous > Enable';
    } else if(e.code === 'auth/network-request-failed'){
      authError.textContent = 'تأكد إنك متصل بالنت وحاول تاني';
    } else {
      authError.textContent = 'حصل خطأ: ' + e.message;
    }
    startBtn.disabled = false;
    startBtn.textContent = 'ابدأ';
  }
});

document.getElementById('googleSignInBtn').addEventListener('click', async ()=>{

    armBootWatchdog();

    gBtn.disabled = false;

      try{ await auth.signInWithRedirect(provider); }
      catch(err2){ authError.textContent = 'حصل خطأ: ' + err2.message; }
    } else if(err.code === 'auth/unauthorized-domain'){
      authError.textContent = 'الدومين ده مش مضاف في Firebase (Authentication > Settings > Authorized domains)';
    } else if(err.code === 'auth/popup-closed-by-user'){
      // لا تفعل شيء
    } else {
      authError.textContent = 'حصل خطأ في تسجيل الدخول بجوجل: ' + err.message;

});

let authResolved = false;
auth.onAuthStateChanged(async (user)=>{
  if(user){
    document.getElementById('bootScreen').classList.remove('hidden');
    armBootWatchdog();
    myUid = user.uid;
    try{
      const snap = await db.ref('users/'+myUid).get();
      if(snap.exists()){
        myProfile = snap.val();
        enterApp();
      } else {
        const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
        if(isGoogle){
          const displayName = user.displayName || 'مستخدم';
          const base = toEnglishUsername(displayName);
          const username = await makeUniqueUsername(base);
          const profile = {
            name: displayName,
            username: username,
            color: avatarColor(username),
            createdAt: Date.now(),
            online: true
          };
          await db.ref('users/'+myUid).set(profile);
          await db.ref('usernames/'+username).set(myUid);
          myProfile = profile;
          enterApp();
        } else {
          showAuthScreen();
        }
      }
      db.ref('users/'+myUid+'/online').set(true);
      db.ref('users/'+myUid+'/online').onDisconnect().set(false);
    }catch(err){
      console.error(err);
      showAuthScreen();
    }
  } else if(!authResolved){

  authResolved = true;
});

const seenChatTs = {};

let swRegistration = null;

function setupNotifications(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    Notification.requestPermission();
  }
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js')
      .then(reg => { swRegistration = reg; })
      .catch(err => console.log('sw register failed', err));
  }
  watchAllChatsForNotifications();
}

function watchAllChatsForNotifications(){
  db.ref('userChats/'+myUid).on('child_added', (snap)=>{
    const chatId = snap.key;
    db.ref('chats/'+chatId+'/meta').on('value', async (metaSnap)=>{
      if(!metaSnap.exists()) return;
      const meta = metaSnap.val();
      if(!meta.lastTs || !meta.lastSender) return;

      if(seenChatTs[chatId] === undefined){
        seenChatTs[chatId] = meta.lastTs;
        return;
      }
      if(meta.lastTs <= seenChatTs[chatId] || meta.lastSender === myUid){
        seenChatTs[chatId] = meta.lastTs;
        return;
      }
      seenChatTs[chatId] = meta.lastTs;

      if(currentChatId === chatId && !document.hidden) return;

      // متبعتش إشعار لو المحادثة دي مكتومة
      const muteSnap = await db.ref('userChats/'+myUid+'/'+chatId+'/muted').get();
      if(muteSnap.exists() && muteSnap.val() === true) return;

      const otherUid = meta.members.find(u=>u!==myUid);
      const otherSnap = await db.ref('users/'+otherUid).get();
      const otherName = otherSnap.exists() ? otherSnap.val().name : 'رسالة جديدة';

      showNotification(otherName, meta.lastMessage, chatId, otherUid);
    });
  });
}

function showNotification(title, body, chatId, otherUid){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const options = {
    body: body || 'رسالة جديدة',
    icon: 'https://cdn-icons-png.flaticon.com/512/2462/2462719.png',
    badge: 'https://cdn-icons-png.flaticon.com/512/2462/2462719.png',
    tag: chatId,
    vibrate: [200,100,200]
  };
  if(swRegistration){
    swRegistration.showNotification(title, options).catch(e=>console.log(e));
  } else if('serviceWorker' in navigator){
    navigator.serviceWorker.ready.then(reg => reg.showNotification(title, options));
  } else {
    try{
      const n = new Notification(title, options);
      n.onclick = ()=>{ window.focus(); n.close(); };
    }catch(e){ console.log('notif error', e); }
  }
}

let allChatsCache = [];
let chatsSearchQuery = '';

function loadChats(){
  db.ref('userChats/'+myUid).on('value', async (snap)=>{
    const list = document.getElementById('chatsList');
    if(!snap.exists()){
      allChatsCache = [];
      list.innerHTML = '<div class="empty-state"><div class="emoji"><svg viewBox="0 0 64 64" width="56" height="56" fill="none"><circle cx="32" cy="32" r="30" fill="#E6F1EB"/><path d="M20 24a4 4 0 0 1 4-4h16a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H27l-6 5v-5a4 4 0 0 1-1-.4V24z" fill="#0F6E5C"/><circle cx="26" cy="29" r="1.6" fill="#D9A441"/><circle cx="32" cy="29" r="1.6" fill="#D9A441"/><circle cx="38" cy="29" r="1.6" fill="#D9A441"/></svg></div>ابدأ أول همسة<br>دوس + وابعت أول رسالة لصاحبك</div>';
      return;
    }
    const chatEntries = snap.val();
    const chatIds = Object.keys(chatEntries);
    const rows = [];
    for(const chatId of chatIds){
      const metaSnap = await db.ref('chats/'+chatId+'/meta').get();
      if(!metaSnap.exists()) continue;
      const meta = metaSnap.val();
      const otherUid = meta.members.find(u=>u!==myUid);
      const otherSnap = await db.ref('users/'+otherUid).get();
      if(!otherSnap.exists()) continue;
      const other = otherSnap.val();
      const entryVal = chatEntries[chatId];
      const pinned = entryVal && entryVal.pinned;
      const muted = entryVal && entryVal.muted;
      rows.push({chatId, other, otherUid, lastMessage: meta.lastMessage||'', lastTs: meta.lastTs||0, pinned, muted});
    }
    // المثبتة فوق، وبعدين ترتيب حسب آخر رسالة
    rows.sort((a,b)=>{
      if(!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
      return b.lastTs - a.lastTs;
    });
    allChatsCache = rows;
    renderChatsList();
  });
}

function renderChatsList(){
  const list = document.getElementById('chatsList');
  let rows = allChatsCache;
  if(chatsSearchQuery.trim()){
    const q = chatsSearchQuery.trim().toLowerCase();
    rows = rows.filter(r => r.other.name.toLowerCase().includes(q) || r.other.username.toLowerCase().includes(q));
  }
  if(rows.length === 0){
    list.innerHTML = chatsSearchQuery.trim()
      ? '<div class="empty-state">مفيش نتايج</div>'
      : '<div class="empty-state"><div class="emoji"><svg viewBox="0 0 64 64" width="56" height="56" fill="none"><circle cx="32" cy="32" r="30" fill="#E6F1EB"/><path d="M20 24a4 4 0 0 1 4-4h16a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H27l-6 5v-5a4 4 0 0 1-1-.4V24z" fill="#0F6E5C"/><circle cx="26" cy="29" r="1.6" fill="#D9A441"/><circle cx="32" cy="29" r="1.6" fill="#D9A441"/><circle cx="38" cy="29" r="1.6" fill="#D9A441"/></svg></div>ابدأ أول همسة<br>دوس + وابعت أول رسالة لصاحبك</div>';
    return;
  }
  const pinSvg = '<svg class="pinIcon" viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M16 3l5 5-1.5 1.5L18 8l-5 5 1 4-1.5 1.5L9 15l-5 5-1-1 5-5-3.5-3.5L6 9l4 1 5-5-.5-1L16 3z" opacity="0"/><path d="M14.5 2.5 21.5 9.5 18 13l1 5-1.5 1.5-5-5-6 6-1.5-1.5 6-6-5-5L7.5 6l5 1 3.5-3.5z"/></svg>';
  const muteSvg = '<svg class="muteIcon" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
  list.innerHTML = rows.map(r=>`
    <div class="chat-item ${r.pinned?'pinned':''}" data-chatid="${r.chatId}" data-uid="${r.otherUid}" data-name="${r.other.name}" data-username="${r.other.username}" data-color="${r.other.color}" data-pinned="${r.pinned?1:0}" data-muted="${r.muted?1:0}">
      <div class="avatarWrap">
        <div class="avatar" style="background:${r.other.color};">${initials(r.other.name)}</div>
        ${r.other.online ? '<span class="onlineDot"></span>' : ''}
      </div>
      <div class="chat-info">
        <div class="row1">
          <span class="name">${r.other.name}</span>
          ${r.pinned?pinSvg:''}
          ${r.muted?muteSvg:''}
          <span class="time" style="margin-right:auto;">${fmtTime(r.lastTs)}</span>
        </div>
        <div class="last">${r.lastMessage || 'ابدأ المحادثة'}</div>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.chat-item').forEach(el=>{
    let longPressFired = false;
    el.addEventListener('click', ()=>{
      if(longPressFired){ longPressFired = false; return; }
      openChat(el.dataset.chatid, el.dataset.uid, el.dataset.name, el.dataset.username, el.dataset.color);
    });
    let pressTimer = null;
    const startPress = (ev)=>{
      longPressFired = false;
      const point = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
      const px = point.clientX, py = point.clientY;
      pressTimer = setTimeout(()=>{
        longPressFired = true;
        openChatLongMenu(el, px, py);
      }, 480);
    };
    const cancelPress = ()=> clearTimeout(pressTimer);
    el.addEventListener('mousedown', startPress);
    el.addEventListener('touchstart', startPress, {passive:true});
    ['mouseup','mouseleave','touchend','touchmove'].forEach(ev=> el.addEventListener(ev, cancelPress));
  });
}

document.getElementById('chatsSearchInput').addEventListener('input', (e)=>{
  chatsSearchQuery = e.target.value;
  renderChatsList();
});

    <button id="clmDelete" class="danger">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>

    </button>
  `;
  document.body.appendChild(menu);

  let left = Math.min(x, window.innerWidth - menuW - 10);

/* شاشة الشات */
let messagesListener = null;
let peerOnlineRef = null;
let peerOnlineListener = null;
let peerTypingRef = null;
let peerTypingListener = null;
let isPeerTyping = false;
let currentMsgsCache = [];
let replyingToMsg = null;
let editingMsg = null;

const REACTION_EMOJIS = ['❤️','😂','😮','😢','🙏','👍'];

function openChat(chatId, otherUid, name, username, color){
  currentChatId = chatId;
  currentPeer = {uid: otherUid, name, username, color};
  document.getElementById('chatPeerName').textContent = name;
  document.getElementById('chatPeerStatus').textContent = '@' + username;
  document.getElementById('chatPeerStatus').style.color = '';
  const av = document.getElementById('chatAvatar');
  av.style.background = color;
  av.textContent = initials(name);
  document.getElementById('chatScreen').classList.remove('hidden');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('msgInput').value = '';
  toggleComposerButtons();
  closeChatSearch();
  cancelReply();
  isPeerTyping = false;

  if(peerOnlineRef) peerOnlineRef.off('value', peerOnlineListener);
  peerOnlineRef = db.ref('users/'+otherUid+'/online');
  peerOnlineListener = (snap)=>{
    if(isPeerTyping) return;
    const statusEl = document.getElementById('chatPeerStatus');
    if(snap.val()){
      statusEl.textContent = 'متصل الآن';
      statusEl.style.color = '#8FE0B8';
    } else {
      statusEl.textContent = '@' + username;
      statusEl.style.color = '';
    }
  };
  peerOnlineRef.on('value', peerOnlineListener);

  if(peerTypingRef) peerTypingRef.off('value', peerTypingListener);
  peerTypingRef = db.ref('chats/'+chatId+'/typing/'+otherUid);
  peerTypingListener = (snap)=>{
    const statusEl = document.getElementById('chatPeerStatus');
    isPeerTyping = !!snap.val();
    if(isPeerTyping){
      statusEl.innerHTML = 'يكتب الآن <span class="typingDots"><span></span><span></span><span></span></span>';
      statusEl.style.color = '#8FE0B8';
    } else {
      statusEl.textContent = '@' + username;
      statusEl.style.color = '';
    }
  };
  peerTypingRef.on('value', peerTypingListener);

  if(messagesListener) db.ref('messages/'+chatId).off('value', messagesListener);
  messagesListener = (snap)=>{
    const box = document.getElementById('messages');
    if(!snap.exists()){ box.innerHTML=''; currentMsgsCache=[]; return; }
    const raw = snap.val();
    const msgs = Object.keys(raw).map(id=>({id, ...raw[id]})).sort((a,b)=>a.ts-b.ts);
    currentMsgsCache = msgs;
    const byId = {};
    msgs.forEach(m=> byId[m.id]=m);

    // علّم رسايل التاني اللي وصلتلي كمقروءة، عشان تظهر عنده صح زرقاء
    const updates = {};
    msgs.forEach(m=>{
      if(m.from !== myUid && !m.seen){
        updates[m.id+'/seen'] = true;
      }
    });
    if(Object.keys(updates).length){
      db.ref('messages/'+chatId).update(updates);
    }

    box.innerHTML = msgs.map(m=> renderMessageBubble(m, byId)).join('');
    box.scrollTop = box.scrollHeight;
  };
  db.ref('messages/'+chatId).on('value', messagesListener);
}

/* بناء اقتباس الرد المصغّر جوه فقاعة الرسالة */
function renderReplyQuote(m, byId){
  if(!m.replyTo) return '';
  const orig = byId[m.replyTo];
  const fromName = m.replyToFrom === myUid ? 'أنت' : (currentPeer ? currentPeer.name : '');
  let preview = m.replyToPreview || '';
  let thumb = '';
  if(orig){
    if(orig.deleted){ preview = 'تم حذف الرسالة'; }
    else if(orig.type === 'image'){ preview = '📷 صورة'; thumb = `<img class="rqThumb" src="${orig.image}">`; }
    else if(orig.type === 'video'){ preview = '🎥 فيديو'; thumb = `<img class="rqThumb" src="${orig.video}">`; }
    else if(orig.type === 'voice'){ preview = '🎤 رسالة صوتية'; }
    else if(orig.type === 'location'){ preview = '📍 موقع'; }
    else { preview = orig.text || preview; }
  }
  return `
  <div class="replyQuote" data-goto="${m.replyTo}">
    <div class="rqBody">
      <div class="rqName">${escapeHtml(fromName)}</div>
      <div class="rqText">${escapeHtml(preview)}</div>
    </div>
    ${thumb}
  </div>`;
}

function renderReactionsBadge(m){
  if(!m.reactions) return '';
  const entries = Object.entries(m.reactions); // uid -> emoji
  if(entries.length === 0) return '';
  const uniqueEmojis = [...new Set(entries.map(e=>e[1]))].slice(0,3);
  const countTxt = entries.length > 1 ? `<span class="reactCount">${entries.length}</span>` : '';
  return `<div class="msgReactions" data-mid="${m.id}">${uniqueEmojis.join('')}${countTxt}</div>`;
}

function renderMessageBubble(m, byId){
  const out = m.from === myUid ? 'in' : 'out';
  const ticks = out === 'in' ? renderTicks(m) : '';
  const replyHtml = renderReplyQuote(m, byId);
  const reactionsHtml = renderReactionsBadge(m);
  const editedTag = m.edited ? '<span class="editedTag">معدّلة</span>' : '';

  if(m.deleted){
    const delIcon = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.9" y1="4.9" x2="19.1" y2="19.1"/></svg>';
    return `
    <div class="bubble deletedMsg ${out}" data-mid="${m.id}" data-mtype="deleted">
      ${delIcon}<span>${m.from===myUid?'حذفت هذه الرسالة':'تم حذف هذه الرسالة'}</span>
      <div class="t">${fmtTime(m.ts)}${ticks}</div>
    </div>`;
  }

  if(m.type === 'voice'){
    return renderVoiceBubble(m, out, ticks, replyHtml, reactionsHtml, m.id);
  }
  if(m.type === 'image'){
    return `
    <div class="bubble image ${out}" data-mid="${m.id}" data-mtype="image">
      ${replyHtml}
      <img src="${m.image}" data-full="${m.image}">
      <div class="t">${fmtTime(m.ts)}${ticks}</div>
      ${reactionsHtml}
    </div>`;
  }
  if(m.type === 'video'){
    return `
    <div class="bubble video ${out}" data-mid="${m.id}" data-mtype="video">
      ${replyHtml}
      <video src="${m.video}" controls preload="metadata" playsinline></video>
      <div class="t">${fmtTime(m.ts)}${ticks}</div>
      ${reactionsHtml}
    </div>`;
  }
  if(m.type === 'location'){
    return `
    <div class="bubble location ${out}" data-mid="${m.id}" data-mtype="location">
      ${replyHtml}
      <div class="locCard" data-lat="${m.lat}" data-lng="${m.lng}">
        <div class="locMap">
          <div class="locPin"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/></svg></div>
        </div>
        <div class="locInfo">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--brand)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <div><b>الموقع</b><br><span>دوس تفتح في الخرائط</span></div>
        </div>
      </div>
      <div class="t">${fmtTime(m.ts)}${ticks}</div>
      ${reactionsHtml}
    </div>`;
  }
  return `
  <div class="bubble ${out}" data-mid="${m.id}" data-mtype="text">
    ${replyHtml}
    ${escapeHtml(m.text)}
    <div class="t">${editedTag}${fmtTime(m.ts)}${ticks}</div>
    ${reactionsHtml}
  </div>`;
}

/* علامات الاستلام والقراءة بشكل واتساب: صح واحدة = اتبعتت، صح مزدوجة رمادي = اتوصلت، صح مزدوجة زرقاء = اتقرأت */
function renderTicks(m){
  const doubleTickSvg = '<svg viewBox="0 0 16 11" width="15" height="11" fill="none"><path d="M11.1 0.4 4.5 7 1.5 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.1 0.4 8.5 7 7.3 5.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const singleTickSvg = '<svg viewBox="0 0 16 11" width="15" height="11" fill="none"><path d="M11.1 0.4 4.5 7 1.5 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  if(m.seen){
    return `<span class="checkmarks read">${doubleTickSvg}</span>`;
  }
  if(m.delivered){
    return `<span class="checkmarks sent">${doubleTickSvg}</span>`;
  }
  return `<span class="checkmarks sent">${singleTickSvg}</span>`;
}

let msgPressTimer = null;
let msgLongFired = false;
document.getElementById('messages').addEventListener('mousedown', (e)=> startMsgPress(e));

['mouseup','mouseleave','touchend','touchmove'].forEach(ev=>{

function startMsgPress(e){
  const bubble = e.target.closest('.bubble');
  if(!bubble || bubble.dataset.mtype === 'deleted') return;
  const point = e.touches && e.touches[0] ? e.touches[0] : e;
  const px = point.clientX, py = point.clientY;
  msgLongFired = false;
  msgPressTimer = setTimeout(()=>{
    msgLongFired = true;
    openMsgContextMenu(bubble, px, py);
  }, 430);
}

function scrollToMessage(mid){
  const el = document.querySelector(`.bubble[data-mid="${mid}"]`);
  if(!el) return;
  el.scrollIntoView({behavior:'smooth', block:'center'});
  el.classList.add('searchActive');
  setTimeout(()=> el.classList.remove('searchActive'), 900);
}

    <button id="mcmCopy">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      نسخ النص
    </button>`;
  }

    if(mtype === 'text'){
      itemsHtml += `
      <button id="mcmEdit">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

  if(delBtn) delBtn.addEventListener('click', async ()=>{
    closeMenu();
    if(!confirm('تمسح الرسالة دي؟')) return;
    await db.ref('messages/'+currentChatId+'/'+mid).update({
      deleted:true, text:null, image:null, video:null, audio:null, wave:null,

/* ---- منتقي الإيموجي السريع للتفاعل ---- */
function openReactionPicker(anchorEl, mid){
  document.querySelectorAll('.reactionPicker,.msgContextOverlay').forEach(n=>n.remove());
  const rect = anchorEl.getBoundingClientRect();

  const overlay = document.createElement('div');
  overlay.className = 'msgContextOverlay';
  document.body.appendChild(overlay);

  const picker = document.createElement('div');
  picker.className = 'reactionPicker';
  picker.innerHTML = REACTION_EMOJIS.map(em=>`<button data-em="${em}">${em}</button>`).join('');
  document.body.appendChild(picker);

  const pickerW = picker.offsetWidth || 260;
  let left = rect.left + rect.width/2 - pickerW/2;
  left = Math.max(10, Math.min(left, window.innerWidth - pickerW - 10));
  let top = rect.top - 54;
  if(top < 10) top = rect.bottom + 8;
  picker.style.left = left + 'px';
  picker.style.top = top + 'px';

  function closeAll(){ overlay.remove(); picker.remove(); }
  overlay.addEventListener('click', closeAll);
  picker.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const em = btn.dataset.em;
      const m = currentMsgsCache.find(mm=>mm.id===mid);
      const already = m && m.reactions && m.reactions[myUid] === em;
      closeAll();
      if(already){
        await db.ref('messages/'+currentChatId+'/'+mid+'/reactions/'+myUid).remove();
      } else {
        await db.ref('messages/'+currentChatId+'/'+mid+'/reactions/'+myUid).set(em);
      }
    });
  });
}

let chatSearchHits = [];
let chatSearchIdx = -1;
function closeChatSearch(){
  document.getElementById('chatSearchBar').classList.remove('active');
  document.getElementById('chatSearchInput').value = '';
  document.getElementById('chatSearchCount').textContent = '';
  document.querySelectorAll('.bubble.searchHit').forEach(el=>el.classList.remove('searchHit'));
  chatSearchHits = [];
  chatSearchIdx = -1;
}
document.getElementById('chatSearchToggleBtn').addEventListener('click', ()=>{
  document.getElementById('chatSearchBar').classList.add('active');
  document.getElementById('chatSearchInput').focus();
});
document.getElementById('chatSearchCloseBtn').addEventListener('click', closeChatSearch);
document.getElementById('chatSearchInput').addEventListener('input', (e)=>{
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.bubble.searchHit').forEach(el=>el.classList.remove('searchHit'));
  if(!q){ chatSearchHits=[]; chatSearchIdx=-1; document.getElementById('chatSearchCount').textContent=''; return; }
  chatSearchHits = currentMsgsCache.filter(m=> !m.deleted && m.type===undefined && (m.text||'').toLowerCase().includes(q));
  chatSearchIdx = chatSearchHits.length ? chatSearchHits.length-1 : -1;
  chatSearchHits.forEach(m=>{
    const el = document.querySelector(`.bubble[data-mid="${m.id}"]`);
    if(el) el.classList.add('searchHit');
  });
  updateChatSearchCount();
  if(chatSearchIdx >= 0) scrollToMessage(chatSearchHits[chatSearchIdx].id);
});
function updateChatSearchCount(){
  const el = document.getElementById('chatSearchCount');
  if(chatSearchHits.length === 0){ el.textContent = 'مفيش نتايج'; return; }
  el.textContent = (chatSearchIdx+1) + ' / ' + chatSearchHits.length;
}
document.getElementById('chatSearchUpBtn').addEventListener('click', ()=>{
  if(chatSearchHits.length === 0) return;
  chatSearchIdx = chatSearchIdx <= 0 ? chatSearchHits.length-1 : chatSearchIdx-1;
  updateChatSearchCount();
  scrollToMessage(chatSearchHits[chatSearchIdx].id);
});
document.getElementById('chatSearchDownBtn').addEventListener('click', ()=>{
  if(chatSearchHits.length === 0) return;
  chatSearchIdx = chatSearchIdx >= chatSearchHits.length-1 ? 0 : chatSearchIdx+1;
  updateChatSearchCount();
  scrollToMessage(chatSearchHits[chatSearchIdx].id);
});

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
document.getElementById('chatBackBtn').addEventListener('click', ()=>{
  document.getElementById('chatScreen').classList.add('hidden');
  if(messagesListener){ db.ref('messages/'+currentChatId).off('value', messagesListener); messagesListener=null; }
  if(peerOnlineRef){ peerOnlineRef.off('value', peerOnlineListener); peerOnlineRef=null; peerOnlineListener=null; }
  if(peerTypingRef){ peerTypingRef.off('value', peerTypingListener); peerTypingRef=null; peerTypingListener=null; }
  setTyping(false);
  closeChatSearch();
  cancelReply();
  currentChatId = null;
  if(currentVoiceAudio){ currentVoiceAudio.pause(); currentVoiceAudio = null; currentVoiceId = null; }
});
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('msgInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') sendMessage(); });
async function sendMessage(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || !currentChatId) return;
  input.value = '';
  toggleComposerButtons();
  setTyping(false);

  if(editingMsg){
    const editId = editingMsg.id;
    cancelReply();
    await db.ref('messages/'+currentChatId+'/'+editId).update({text, edited:true});
    // حدّث آخر رسالة في قايمة الشاتات لو دي كانت آخر رسالة
    const metaSnap = await db.ref('chats/'+currentChatId+'/meta').get();
    if(metaSnap.exists() && metaSnap.val().lastTs === editingMsg.ts){
      await db.ref('chats/'+currentChatId+'/meta').update({lastMessage: text});
    }
    return;
  }

  const ts = Date.now();
  const payload = {from: myUid, text, ts, delivered:true};
  if(replyingToMsg){
    payload.replyTo = replyingToMsg.id;
    payload.replyToFrom = replyingToMsg.from;
    payload.replyToPreview = replyPreviewText(replyingToMsg);
  }
  cancelReply();
  await db.ref('messages/'+currentChatId).push(payload);
  await db.ref('chats/'+currentChatId+'/meta').update({lastMessage: text, lastTs: ts, lastSender: myUid});
}

function replyPreviewText(m){
  if(m.deleted) return 'تم حذف الرسالة';
  if(m.type === 'image') return '📷 صورة';
  if(m.type === 'video') return '🎥 فيديو';
  if(m.type === 'voice') return '🎤 رسالة صوتية';
  if(m.type === 'location') return '📍 موقع';
  return m.text || '';
}

/* ---- شريط الرد فوق الكومبوزر ---- */
function startReply(m){
  editingMsg = null;
  replyingToMsg = m;
  const bar = document.getElementById('replyBar');
  bar.classList.remove('editingBar');
  bar.classList.add('active');
  document.getElementById('rbName').textContent = m.from === myUid ? 'أنت' : (currentPeer ? currentPeer.name : '');

  document.getElementById('msgInput').focus();
}
function startEdit(m){
  replyingToMsg = null;
  editingMsg = m;
  const bar = document.getElementById('replyBar');
  bar.classList.add('active');
  bar.classList.add('editingBar');
  document.getElementById('rbName').textContent = 'تعديل الرسالة';
  document.getElementById('rbText').textContent = m.text || '';
  document.getElementById('msgInput').value = m.text || '';
  toggleComposerButtons();
  document.getElementById('msgInput').focus();
}
function cancelReply(){
  replyingToMsg = null;
  editingMsg = null;
  const bar = document.getElementById('replyBar');
  bar.classList.remove('active');
  bar.classList.remove('editingBar');
}
document.getElementById('rbCloseBtn').addEventListener('click', ()=>{
  const wasEditing = !!editingMsg;

  if(wasEditing){
    document.getElementById('msgInput').value = '';
    toggleComposerButtons();

});

document.getElementById('msgInput').addEventListener('input', ()=>{

  handleTypingInput();
});
function toggleComposerButtons(){
  const hasText = document.getElementById('msgInput').value.trim().length > 0;

const toastHost = document.getElementById('toastHost');
function toastIconSvg(kind){
  if(kind === 'error'){
    return '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16.5" x2="12" y2="16.5"/></svg>';
  }
  if(kind === 'success'){
    return '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  }
  return '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><line x1="12" y1="7.5" x2="12" y2="7.5"/></svg>';
}
function showToast(message, kind='info', duration=4200){
  const card = document.createElement('div');
  card.className = 'toastCard ' + kind;
  card.innerHTML = `
    <span class="toastIconWrap">${toastIconSvg(kind)}</span>
    <span class="toastText">${escapeHtml(message)}</span>
    <button class="toastClose" aria-label="إغلاق"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  `;
  toastHost.appendChild(card);
  const remove = ()=>{
    card.classList.add('leaving');
    setTimeout(()=> card.remove(), 180);
  };
  card.querySelector('.toastClose').addEventListener('click', remove);
  setTimeout(remove, duration);
}
